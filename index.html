<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة ENS-TECH الرقمية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- متغيرات الألوان الفخمة --- */
        :root {
            --primary-maroon: #720000;
            --dark-maroon: #4a0000;
            --accent-gold: #c5a059;
            --gold-gradient: linear-gradient(135deg, #c5a059, #8e6d2f);
            --bg-body: #f8fafc;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.85);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --radius-xl: 24px;
            --radius-md: 16px;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0; background-color: var(--bg-body); color: var(--text-main); overflow-x: hidden;
        }

        /* --- شاشة الدخول --- */
        #login-page {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(rgba(114, 0, 0, 0.8), rgba(74, 0, 0, 0.9)), 
                        url('https://www.transparenttextures.com/patterns/cubes.png');
        }

        .login-card {
            background: var(--glass); backdrop-filter: blur(15px); padding: 50px 40px;
            border-radius: var(--radius-xl); width: 420px; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3); animation: fadeInScale 0.6s ease;
        }

        .login-card img {
            width: 140px; height: 140px; border-radius: 50%; border: 4px solid var(--accent-gold);
            padding: 5px; background: white; margin-bottom: 25px;
        }

        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); color: var(--primary-maroon); }
        .input-group input {
            width: 100%; padding: 16px 50px 16px 16px; border: 2px solid transparent;
            border-radius: var(--radius-md); background: white; box-sizing: border-box; outline: none;
        }

        .btn-login {
            width: 100%; padding: 16px; background: var(--primary-maroon); color: white;
            border: none; border-radius: var(--radius-md); font-weight: 700; cursor: pointer; transition: 0.3s;
        }

        /* --- لوحة التحكم --- */
        #app-dashboard { display: none; }
        header {
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); padding: 15px 50px;
            display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000;
        }

        .sidebar {
            width: 280px; height: 85vh; background: var(--primary-maroon); position: fixed;
            right: 20px; top: 100px; border-radius: var(--radius-xl); padding: 30px 15px; color: white;
        }

        .sidebar-menu { list-style: none; padding: 0; }
        .sidebar-menu li {
            padding: 16px 20px; margin-bottom: 12px; border-radius: var(--radius-md);
            cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.3s; opacity: 0.8;
        }
        .sidebar-menu li.active { background: var(--gold-gradient); opacity: 1; transform: translateX(-10px); }

        .main-content { margin-right: 320px; padding: 40px 60px; }
        .vertical-grid { display: flex; flex-direction: column; gap: 20px; max-width: 900px; margin: 0 auto; }

        .square-card {
            background: var(--white); padding: 25px; border-radius: var(--radius-xl);
            display: flex; align-items: center; gap: 25px; border: 1px solid rgba(0,0,0,0.02);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .icon-box {
            width: 70px; height: 70px; background: #fff5f5; border-radius: 18px;
            display: flex; align-items: center; justify-content: center; font-size: 30px;
            color: var(--primary-maroon); overflow: hidden;
        }
        .icon-box img { width: 100%; height: 100%; object-fit: cover; }

        .card-info .value { font-size: 18px; font-weight: 800; color: var(--primary-maroon); display: block; }

        /* --- قسم الرفع --- */
        .upload-area {
            background: white; padding: 25px; border-radius: var(--radius-xl);
            margin-bottom: 30px; border: 2px dashed var(--accent-gold);
        }

        section { display: none; }
        section.active { display: block; animation: fadeInUp 0.5s ease; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-card">
            <img src="https://i.ibb.co/QFYMyJC0/photo-5976805467994393998-y.jpg" alt="Logo">
            <h2 style="color:var(--primary-maroon);">ENS-TECH ANNABA</h2>
            <div class="input-group">
                <i class="fas fa-id-badge"></i>
                <input type="text" id="username" placeholder="رقم التسجيل البيومتري">
            </div>
            <div class="input-group">
                <i class="fas fa-fingerprint"></i>
                <input type="password" id="password" placeholder="كلمة المرور">
            </div>
            <button class="btn-login" onclick="handleLogin()">دخول البوابة</button>
        </div>
    </div>

    <div id="app-dashboard">
        <header>
            <div style="display:flex; align-items:center;">
                <img src="https://i.ibb.co/QFYMyJC0/photo-5976805467994393998-y.jpg" style="height:50px; border-radius:50%;">
                <div style="margin-right:15px;"><strong>المدرسة الوطنية العليا للتكنولوجيا</strong></div>
            </div>
            <button onclick="location.reload()">خروج</button>
        </header>

        <div class="sidebar">
            <ul class="sidebar-menu">
                <li class="active" onclick="showTab('profile', this)"><i class="fas fa-user"></i> الملف الشخصي</li>
                <li onclick="showTab('courses', this)"><i class="fas fa-book"></i> الملخصات والدروس</li>
            </ul>
        </div>

        <div class="main-content">
            <section id="profile" class="active">
                <h2>بطاقة الطالب</h2>
                <div class="vertical-grid">
                    <div class="square-card"><div class="icon-box"><i class="fas fa-id-card"></i></div><div class="card-info"><h4>الرقم</h4><span class="value" id="disp-id"></span></div></div>
                </div>
            </section>

            <section id="courses">
                <h2>المكتبة الرقمية المشتركة</h2>
                
                <div class="upload-area">
                    <div style="display:flex; flex-direction:column; gap:10px;">
                        <input type="text" id="summaryTitle" placeholder="عنوان الملخص..." style="padding:12px; border-radius:10px; border:1px solid #ddd;">
                        <div style="display:flex; gap:10px;">
                            <label for="imgInput" style="flex:1; background:#eee; padding:12px; text-align:center; border-radius:10px; cursor:pointer;">إضافة صورة</label>
                            <input type="file" id="imgInput" accept="image/*" style="display:none" onchange="previewImage(this)">
                            <button onclick="saveAndUpload()" style="flex:1; background:var(--primary-maroon); color:white; border:none; border-radius:10px; cursor:pointer;">نشر للجميع</button>
                        </div>
                        <div id="p-container" style="display:none; text-align:center;"><img id="p-img" style="max-height:100px; border-radius:10px; border:2px solid var(--accent-gold);"></div>
                    </div>
                </div>

                <div class="vertical-grid" id="summaryContainer">
                    </div>
            </section>
        </div>
    </div>

    <script>
        const API_URL = "https://ensti-3.onrender.com/summaries";
        let currentBase64 = "";

        function handleLogin() {
            const user = document.getElementById('username').value;
            if (user.length >= 4) {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('app-dashboard').style.display = 'block';
                document.getElementById('disp-id').innerText = user;
                loadData(); // جلب البيانات عند الدخول
            }
        }

        function showTab(id, el) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sidebar-menu li').forEach(li => li.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentBase64 = e.target.result;
                    document.getElementById('p-img').src = e.target.result;
                    document.getElementById('p-container').style.display = 'block';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // جلب البيانات من سيرفر Render
        async function loadData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const container = document.getElementById('summaryContainer');
                container.innerHTML = ""; // تنظيف القائمة
                data.forEach(item => {
                    addCardToUI(item.title, item.image);
                });
            } catch (e) { console.log("السيرفر فارغ أو غير متصل"); }
        }

        // إرسال البيانات لسيرفر Render
        async function saveAndUpload() {
            const title = document.getElementById('summaryTitle').value;
            if (!title) return alert("اكتب عنواناً");

            const payload = { title: title, image: currentBase64 };

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    addCardToUI(title, currentBase64);
                    document.getElementById('summaryTitle').value = "";
                    document.getElementById('p-container').style.display = 'none';
                    currentBase64 = "";
                    alert("تم النشر بنجاح!");
                }
            } catch (e) { alert("خطأ في الاتصال بالسيرفر"); }
        }

        function addCardToUI(title, img) {
            const container = document.getElementById('summaryContainer');
            const card = document.createElement('div');
            card.className = 'square-card';
            card.innerHTML = `
                <div class="icon-box">${img ? `<img src="${img}">` : '<i class="fas fa-file-alt"></i>'}</div>
                <div class="card-info"><h4>تمت المشاركة</h4><span class="value">${title}</span></div>
            `;
            container.prepend(card);
        }
    </script>
</body>
</html>
